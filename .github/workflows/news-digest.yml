name: 世界杯快讯抓取

on:
  schedule:
    # 每6小时跑一次（UTC时间）：北京时间 06:00 / 12:00 / 18:00 / 00:00
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/news-digest/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/news-digest/requirements.txt

      - name: Run digest
        env:
          INGEST_URL: ${{ secrets.NEWS_INGEST_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
        run: python scripts/news-digest/fetch_and_digest.py
