name: 自动部署到腾讯云香港

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.161.217.43
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/jingcai

            echo "=== git pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== npm install ==="
            npm ci --prefer-offline 2>/dev/null || npm install

            echo "=== build ==="
            npm run build

            echo "=== copy static files ==="
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            echo "=== pm2 restart ==="
            pm2 restart jingcai || pm2 start .next/standalone/server.js --name jingcai

            echo "=== done ==="
            pm2 status jingcai
